---
argument_specs:
  main:
    short_description: Obtain a Let's Encrypt certificate via the Cloudflare DNS-01 challenge.
    description:
      - Installs certbot and the certbot-dns-cloudflare plugin (apt on Ubuntu/Debian, dnf on Fedora Server),
        writes the Cloudflare API token to /root/.secrets/cloudflare.ini (mode 0400), then runs
        certbot certonly --dns-cloudflare for inventory_hostname so the host never needs ports 80/443 exposed.
    author:
      - Dan Wallace
    options:
      cloudflare_ssl_email:
        description:
          - Email address passed to certbot via --email for the ACME account and expiry notices.
          - Supply from an ansible-vault encrypted file.
        type: str
        required: true
      cloudflare_ssl_api_token:
        description:
          - Cloudflare API token scoped to DNS edit for the target zone; written into /root/.secrets/cloudflare.ini.
          - Supply from an ansible-vault encrypted file.
        type: str
        required: true
      cloudflare_ssl_debian_packages:
        description: Packages installed via apt on Ubuntu/Debian to provide certbot and the Cloudflare DNS plugin.
        type: list
        elements: str
        required: false
        default:
          - python3-certbot
          - python3-certbot-dns-cloudflare
      cloudflare_ssl_fedora_packages:
        description: Packages installed via dnf on Fedora Server to provide certbot and the Cloudflare DNS plugin.
        type: list
        elements: str
        required: false
        default:
          - python3-certbot
          - python3-certbot-dns-cloudflare
