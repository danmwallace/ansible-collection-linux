---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: ansible-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout into collection path
        uses: actions/checkout@v6
        with:
          path: ansible_collections/danmwallace/linux
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ansible-dev-tools
        run: pip install ansible-dev-tools
      - name: Install collection dependencies
        working-directory: ansible_collections/danmwallace/linux
        run: |
          if [ -f requirements.yml ]; then
            ansible-galaxy collection install -r requirements.yml
          fi
      - name: Run ansible-lint
        working-directory: ansible_collections/danmwallace/linux
        run: ansible-lint

  build:
    name: build-collection
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout into collection path
        uses: actions/checkout@v6
        with:
          path: ansible_collections/danmwallace/linux
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: pip install ansible-core
      - name: Build collection
        working-directory: ansible_collections/danmwallace/linux
        run: ansible-galaxy collection build --output-path dist/
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: collection-tarball
          path: ansible_collections/danmwallace/linux/dist/*.tar.gz
          retention-days: 7

  tag-check:
    name: release-tag audit
    runs-on: ubuntu-latest
    steps:
      # Needs full history + tags so the audit can map each galaxy.yml version
      # to its bump commit and compare against existing vX.Y.Z tags.
      - name: Check out with full history and tags
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Audit git tags against released versions
        # Reports missing tags (non-fatal); fails only if a vX.Y.Z tag points at
        # a commit that never carried that version. See the galaxy-tag-sync skill.
        run: python3 .github/scripts/sync_tags.py --all-versions .
